server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|woff2?|ttf|eot|png|jpg|jpeg|svg|webp|ico)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public";
  }
}
